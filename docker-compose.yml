# Local development services for Brainly.
# Start with:  docker compose up -d
# Stop with:   docker compose down   (add -v to also wipe the database volume)
services:
  mongo:
    image: mongo:latest
    container_name: brainly-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - brainly-mongo-data:/data/db

volumes:
  brainly-mongo-data:
